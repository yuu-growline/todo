<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO — Yuu's Task Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>📋 TODO <span class="subtitle">Task Board</span></h1>
      <div class="stats">
        <span class="stat-item"><span id="count-active">0</span> 件 未完了</span>
        <span class="stat-divider">/</span>
        <span class="stat-item"><span id="count-done">0</span> 件 完了</span>
      </div>
    </header>

    <section class="input-area">
      <form id="add-form" class="add-form">
        <input
          type="text"
          id="input-title"
          placeholder="新しいタスクを入力（Enterで追加）"
          autocomplete="off"
          required
        />
        <select id="input-priority" title="優先度">
          <option value="high">🔥 高</option>
          <option value="mid" selected>🌿 中</option>
          <option value="low">🍃 低</option>
        </select>
        <input type="date" id="input-due" title="期限" />
        <input
          type="text"
          id="input-tag"
          placeholder="タグ（任意）"
          autocomplete="off"
        />
        <button type="submit" class="btn-primary">追加</button>
      </form>
    </section>

    <section class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="done">完了</button>
      </div>
      <div class="toolbar-right">
        <input
          type="search"
          id="search"
          placeholder="🔍 検索..."
          autocomplete="off"
        />
        <select id="sort">
          <option value="created-desc">追加が新しい順</option>
          <option value="created-asc">追加が古い順</option>
          <option value="priority">優先度順</option>
          <option value="due">期限が近い順</option>
        </select>
      </div>
    </section>

    <main>
      <ul id="todo-list" class="todo-list"></ul>
      <div id="empty-state" class="empty-state hidden">
        <p>🌿 タスクはありません</p>
        <p class="empty-hint">上のフォームから追加してみましょう</p>
      </div>
    </main>

    <footer class="footer">
      <button id="btn-export" class="btn-ghost">📤 書き出し</button>
      <button id="btn-import" class="btn-ghost">📥 読み込み</button>
      <input type="file" id="file-import" accept="application/json" hidden />
      <button id="btn-clear-done" class="btn-ghost">🧹 完了を一括削除</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
